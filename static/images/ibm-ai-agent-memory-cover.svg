<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI Agent Memory</title>
  <desc id="desc">Editorial cover showing five types of AI agent memory.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="78%">
      <stop offset="0%" stop-color="#19385c"/>
      <stop offset="45%" stop-color="#0b1728"/>
      <stop offset="100%" stop-color="#050711"/>
    </radialGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8cc8ff"/><stop offset="1" stop-color="#0f62fe"/></linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6ee7ff"/><stop offset="1" stop-color="#7cf7b6"/></linearGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity=".5"/></filter>
    <pattern id="grid" width="54" height="54" patternUnits="userSpaceOnUse"><path d="M54 0H0V54" fill="none" stroke="#fff" stroke-opacity=".045"/></pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <g transform="translate(120 120)">
    <text y="0" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="34" font-weight="800" letter-spacing="3" fill="#8cc8ff">AI AGENT SYSTEMS</text>
    <text y="88" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="86" font-weight="900" fill="#ffffff">AI Agent Memory</text>
    <text y="154" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="40" font-weight="700" fill="#d8e8ff">Remember · Retrieve · Adapt</text>
    <rect y="190" width="510" height="4" rx="2" fill="url(#cyan)"/>
  </g>
  <g transform="translate(690 170)" filter="url(#shadow)">
    <circle cx="250" cy="250" r="150" fill="#111f35" stroke="#8cc8ff" stroke-width="3"/>
    <circle cx="250" cy="250" r="82" fill="url(#blue)" opacity=".95"/>
    <text x="250" y="244" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="850" fill="#fff">Memory</text>
    <text x="250" y="282" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="#fff">Core</text>
    <g fill="#111f35" stroke="#7cf7b6" stroke-width="2.5">
      <rect x="-205" y="-30" width="240" height="78" rx="22"/>
      <rect x="465" y="-30" width="240" height="78" rx="22"/>
      <rect x="-250" y="365" width="250" height="78" rx="22"/>
      <rect x="125" y="475" width="250" height="78" rx="22"/>
      <rect x="500" y="365" width="250" height="78" rx="22"/>
    </g>
    <g font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="#eef8ff" text-anchor="middle">
      <text x="-85" y="19">Short-term</text>
      <text x="585" y="19">Long-term</text>
      <text x="-125" y="414">Episodic</text>
      <text x="250" y="524">Semantic</text>
      <text x="625" y="414">Procedural</text>
    </g>
    <g stroke="#cfe3ff" stroke-opacity=".55" stroke-width="3" fill="none">
      <path d="M110 165L10 35"/><path d="M390 165L490 35"/><path d="M130 335L-20 380"/><path d="M250 400v75"/><path d="M370 335l150 45"/>
    </g>
  </g>
  <g transform="translate(120 640)">
    <rect width="520" height="110" rx="28" fill="#0f1f36" stroke="#8cc8ff" stroke-opacity=".4"/>
    <text x="38" y="47" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#fff">Context is temporary.</text>
    <text x="38" y="82" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#7cf7b6">Memory is designed.</text>
  </g>
</svg>
