<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">GameMaker GMRT and Claude Code workflow</title>
  <desc id="desc">A dark technical illustration showing GameMaker, GMRT, GM-CLI and Claude Code connected in a game development workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1021"/>
      <stop offset="0.5" stop-color="#121a33"/>
      <stop offset="1" stop-color="#071827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.18" stroke="#8ba4ff" stroke-width="1">
    <path d="M0 160H1600M0 300H1600M0 440H1600M0 580H1600M0 720H1600"/>
    <path d="M160 0V900M320 0V900M480 0V900M640 0V900M800 0V900M960 0V900M1120 0V900M1280 0V900M1440 0V900"/>
  </g>
  <circle cx="1290" cy="180" r="210" fill="#06b6d4" opacity="0.12" filter="url(#glow)"/>
  <circle cx="270" cy="730" r="260" fill="#7c3aed" opacity="0.14" filter="url(#glow)"/>
  <text x="110" y="150" fill="#e5e7eb" font-family="Inter, Pretendard, Arial" font-size="64" font-weight="800">GameMaker 2026</text>
  <text x="112" y="210" fill="#a5b4fc" font-family="Inter, Pretendard, Arial" font-size="30">GMRT · GM-CLI · Claude Code</text>
  <g transform="translate(130 310)">
    <rect width="360" height="210" rx="30" fill="#111827" stroke="#3b82f6" stroke-width="3"/>
    <text x="40" y="72" fill="#f8fafc" font-family="Inter, Pretendard, Arial" font-size="36" font-weight="700">GameMaker</text>
    <text x="40" y="120" fill="#94a3b8" font-family="Inter, Pretendard, Arial" font-size="24">2D engine ecosystem</text>
    <text x="40" y="160" fill="#94a3b8" font-family="Inter, Pretendard, Arial" font-size="24">GML + new languages</text>
  </g>
  <g transform="translate(620 270)">
    <rect width="360" height="290" rx="34" fill="url(#accent)" opacity="0.96"/>
    <text x="48" y="82" fill="#fff" font-family="Inter, Pretendard, Arial" font-size="44" font-weight="800">GMRT</text>
    <text x="48" y="132" fill="#e0f2fe" font-family="Inter, Pretendard, Arial" font-size="25">new runtime layer</text>
    <line x1="48" y1="166" x2="312" y2="166" stroke="#e0f2fe" opacity="0.55"/>
    <text x="48" y="210" fill="#fff" font-family="Inter, Pretendard, Arial" font-size="23">source-available roadmap</text>
    <text x="48" y="246" fill="#fff" font-family="Inter, Pretendard, Arial" font-size="23">better 3D handling</text>
  </g>
  <g transform="translate(1110 310)">
    <rect width="360" height="210" rx="30" fill="#111827" stroke="#22d3ee" stroke-width="3"/>
    <text x="40" y="72" fill="#f8fafc" font-family="Inter, Pretendard, Arial" font-size="36" font-weight="700">Claude Code</text>
    <text x="40" y="120" fill="#94a3b8" font-family="Inter, Pretendard, Arial" font-size="24">natural language tasks</text>
    <text x="40" y="160" fill="#94a3b8" font-family="Inter, Pretendard, Arial" font-size="24">debug · query · build</text>
  </g>
  <g stroke="#93c5fd" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.9">
    <path d="M500 415 C560 415 560 415 610 415"/>
    <path d="M990 415 C1050 415 1050 415 1100 415"/>
  </g>
  <g transform="translate(420 650)">
    <rect width="760" height="90" rx="24" fill="#020617" stroke="#475569"/>
    <text x="34" y="57" fill="#cbd5e1" font-family="Inter, Pretendard, Arial" font-size="26">GM-CLI: IDE 밖에서 프로젝트 조회, 빌드, 자동화, AI 보조 작업</text>
  </g>
</svg>
