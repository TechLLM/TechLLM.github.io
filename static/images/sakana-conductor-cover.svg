<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.07" stroke="#38bdf8" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Conductor node (center) -->
  <circle cx="600" cy="295" r="70" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.9"/>
  <circle cx="600" cy="295" r="50" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5" opacity="0.8"/>
  <text x="600" y="288" text-anchor="middle" font-family="monospace" font-size="13" fill="#38bdf8" font-weight="bold">CONDUCTOR</text>
  <text x="600" y="308" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">7B · RL</text>

  <!-- Worker nodes -->
  <!-- GPT -->
  <circle cx="210" cy="160" r="38" fill="#1e293b" stroke="#818cf8" stroke-width="1.5"/>
  <text x="210" y="155" text-anchor="middle" font-family="monospace" font-size="12" fill="#818cf8" font-weight="bold">GPT-5</text>
  <text x="210" y="172" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">OpenAI</text>

  <!-- Gemini -->
  <circle cx="990" cy="160" r="38" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <text x="990" y="155" text-anchor="middle" font-family="monospace" font-size="12" fill="#34d399" font-weight="bold">Gemini</text>
  <text x="990" y="172" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">Google</text>

  <!-- Claude -->
  <circle cx="210" cy="430" r="38" fill="#1e293b" stroke="#fb923c" stroke-width="1.5"/>
  <text x="210" y="425" text-anchor="middle" font-family="monospace" font-size="12" fill="#fb923c" font-weight="bold">Claude</text>
  <text x="990" y="441" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">OSS</text>

  <!-- Open Source -->
  <circle cx="990" cy="430" r="38" fill="#1e293b" stroke="#f472b6" stroke-width="1.5"/>
  <text x="990" y="425" text-anchor="middle" font-family="monospace" font-size="12" fill="#f472b6" font-weight="bold">OSS</text>
  <text x="210" y="441" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">Anthropic</text>

  <!-- Connection lines -->
  <line x1="245" y1="185" x2="555" y2="260" stroke="#818cf8" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.6"/>
  <line x1="955" y1="185" x2="645" y2="260" stroke="#34d399" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.6"/>
  <line x1="245" y1="410" x2="555" y2="330" stroke="#fb923c" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.6"/>
  <line x1="955" y1="410" x2="645" y2="330" stroke="#f472b6" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.6"/>

  <!-- Self-loop (recursive) -->
  <path d="M 640 240 Q 720 180 680 240" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="710" y="205" text-anchor="middle" font-family="monospace" font-size="10" fill="#38bdf8" opacity="0.8">recursive</text>

  <!-- Title -->
  <text x="600" y="530" text-anchor="middle" font-family="Georgia, serif" font-size="34" fill="white" font-weight="bold">Learning to Orchestrate</text>
  <text x="600" y="568" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#94a3b8">Sakana AI · ICLR 2026</text>

  <!-- Accent bar -->
  <rect x="460" y="498" width="280" height="3" fill="url(#accent)" rx="2"/>

  <!-- Stats -->
  <text x="330" y="75" text-anchor="middle" font-family="monospace" font-size="13" fill="#38bdf8">LiveCodeBench</text>
  <text x="330" y="95" text-anchor="middle" font-family="monospace" font-size="22" fill="white" font-weight="bold">83.9%</text>
  <text x="870" y="75" text-anchor="middle" font-family="monospace" font-size="13" fill="#818cf8">GPQA-Diamond</text>
  <text x="870" y="95" text-anchor="middle" font-family="monospace" font-size="22" fill="white" font-weight="bold">87.5%</text>
</svg>
