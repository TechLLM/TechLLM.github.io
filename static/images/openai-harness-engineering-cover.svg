<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#1f2937" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#1f2937" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#1f2937" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#1f2937" stroke-width="1"/>
  <!-- Accent bar -->
  <rect x="80" y="120" width="6" height="80" fill="url(#accent)" rx="3"/>
  <!-- Main title -->
  <text x="110" y="172" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="52" font-weight="700" fill="#f0f6fc" letter-spacing="-1">Code is Free.</text>
  <!-- Subtitle -->
  <text x="110" y="240" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="26" fill="#8b949e">Harness Engineering in Practice</text>
  <text x="110" y="278" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="26" fill="#8b949e">Ryan Lopopolo · OpenAI</text>
  <!-- Equation box -->
  <rect x="80" y="340" width="560" height="72" rx="8" fill="#1f2937" stroke="#30363d" stroke-width="1"/>
  <text x="360" y="384" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="24" fill="url(#accent)" text-anchor="middle" font-weight="600">Agent = Model + Harness</text>
  <!-- Right side decorative elements -->
  <circle cx="1000" cy="200" r="120" fill="none" stroke="#00d4aa" stroke-width="1" opacity="0.15"/>
  <circle cx="1000" cy="200" r="80" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.2"/>
  <circle cx="1000" cy="200" r="40" fill="#00d4aa" opacity="0.08"/>
  <text x="1000" y="208" font-family="'SF Mono', monospace" font-size="14" fill="#00d4aa" text-anchor="middle" opacity="0.9">HARNESS</text>
  <!-- Source label -->
  <text x="110" y="580" font-family="'SF Mono', monospace" font-size="16" fill="#484f58">techllm.github.io · 2026</text>
</svg>
