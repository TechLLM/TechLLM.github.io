baseURL = 'https://techllm.github.io/'
languageCode = 'ko'
defaultContentLanguage = 'ko'
title = 'TechLLM'
theme = 'PaperMod'
summaryLength = 28
enableRobotsTXT = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[pagination]
  pagerSize = 9

[taxonomies]
  tag = 'tags'
  category = 'categories'

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[params]
  env = 'production'
  author = 'TechLLM'
  description = 'LLM, AI 에이전트, 자동화, OpenClaw, Claude, 제품화 관점의 실전 기술 블로그'
  keywords = ['LLM', 'AI Agent', 'Claude', 'OpenClaw', 'Automation', 'Tech Blog']
  defaultTheme = 'auto'
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  TocOpen = false
  ShowAllPagesInArchive = true
  mainSections = ['posts']

  [params.homeInfoParams]
    Title = 'TechLLM'
    Content = 'LLM, AI 에이전트, 자동화, 제품화 관점의 기술 블로그'

  [params.profileMode]
    enabled = false
    title = 'TechLLM'
    subtitle = 'LLM, AI 에이전트, 자동화, 제품화 관점의 기술 블로그'
    imageUrl = '/images/profile-techllm.png'
    imageTitle = 'TechLLM'
    imageWidth = 120
    imageHeight = 120

    [[params.profileMode.buttons]]
      name = '글 보기'
      url = '/posts/'
    [[params.profileMode.buttons]]
      name = '검색'
      url = '/search/'
    [[params.profileMode.buttons]]
      name = '아카이브'
      url = '/archives/'

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.35
    minMatchCharLength = 2
    limit = 10
    keys = ['title', 'permalink', 'summary', 'content']

[menu]
  [[menu.main]]
    identifier = 'posts'
    name = '글목록'
    url = '/posts/'
    weight = 10
  [[menu.main]]
    identifier = 'categories'
    name = '카테고리'
    url = '/categories/'
    weight = 15
  [[menu.main]]
    identifier = 'cat-ai-agent'
    name = 'AI Agent'
    url = '/categories/ai-agent/'
    parent = 'categories'
    weight = 1
  [[menu.main]]
    identifier = 'cat-llm-model'
    name = 'LLM & 모델'
    url = '/categories/llm-모델/'
    parent = 'categories'
    weight = 2
  [[menu.main]]
    identifier = 'cat-dev-infra'
    name = 'AI 개발 & 인프라'
    url = '/categories/ai-개발-인프라/'
    parent = 'categories'
    weight = 3
  [[menu.main]]
    identifier = 'cat-trend'
    name = 'AI 트렌드 & 산업'
    url = '/categories/ai-트렌드-산업/'
    parent = 'categories'
    weight = 4
  [[menu.main]]
    identifier = 'cat-safety'
    name = 'AI 안전 & 보안'
    url = '/categories/ai-안전-보안/'
    parent = 'categories'
    weight = 5
  [[menu.main]]
    identifier = 'cat-insight'
    name = '기술 인사이트'
    url = '/categories/기술-인사이트/'
    parent = 'categories'
    weight = 6
  [[menu.main]]
    identifier = 'archives'
    name = '아카이브'
    url = '/archives/'
    weight = 20
  [[menu.main]]
    identifier = 'search'
    name = '검색'
    url = '/search/'
    weight = 30
  [[menu.main]]
    identifier = 'tags'
    name = '태그'
    url = '/tags/'
    weight = 40
  [[menu.main]]
    identifier = 'about'
    name = '소개'
    url = '/about/'
    weight = 50

[params.seo]
  images = ['/images/og-default.png']
