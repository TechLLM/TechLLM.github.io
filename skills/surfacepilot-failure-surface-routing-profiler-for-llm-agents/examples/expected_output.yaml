routing_policy:
  version: "surfacepilot.policy.v1"
  thresholds:
    failure_threshold: 0.34
    min_failures: 1
  rules:
    - id: "surface-rule-001"
      match:
        task_type: "code_edit"
        surface: "file_edit"
      when: "fail_rate >= 0.34 and failures >= 1"
      action:
        - "require diff validation before final answer"
        - "prefer guarded edit routes with tests or dry-run checks"
        - "escalate when edits touch unrelated files"
      evidence:
        events: 1
        failures: 1
        fail_rate: 1.0
        top_signals:
          - "unsafe_edit"
        routes:
          - "edit_direct"
        models:
          - "small-router"
    - id: "surface-rule-002"
      match:
        task_type: "ops"
        surface: "api_call"
      when: "fail_rate >= 0.34 and failures >= 1"
      action:
        - "validate request schema before execution"
        - "prefer routes with dry-run or idempotency safeguards"
        - "verify external state after the call"
      evidence:
        events: 1
        failures: 1
        fail_rate: 1.0
        top_signals:
          - "malformed_api_call"
        routes:
          - "api_direct"
        models:
          - "small-router"
    - id: "surface-rule-003"
      match:
        task_type: "support_qa"
        surface: "citation"
      when: "fail_rate >= 0.34 and failures >= 1"
      action:
        - "require citation support checks before final answer"
        - "block claims that cannot be tied to retrieved evidence"
        - "fallback to a model route with stricter attribution prompts"
      evidence:
        events: 1
        failures: 1
        fail_rate: 1.0
        top_signals:
          - "unsupported_citation"
        routes:
          - "rag_fast"
        models:
          - "small-router"
    - id: "surface-rule-004"
      match:
        task_type: "support_qa"
        surface: "retrieval"
      when: "fail_rate >= 0.34 and failures >= 1"
      action:
        - "prefer verified retrieval routes for this task type"
        - "require freshness and coverage checks before answering"
        - "fallback to an uncertainty response when evidence is weak"
      evidence:
        events: 2
        failures: 1
        fail_rate: 0.5
        top_signals:
          - "stale_retrieval"
        routes:
          - "rag_fast"
          - "rag_verified"
        models:
          - "large-router"
          - "small-router"
